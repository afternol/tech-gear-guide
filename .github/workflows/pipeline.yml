name: Tech Gear Guide Pipeline

on:
  schedule:
    - cron: '0 22 * * *'   # JST 07:00 (UTC 22:00 前日)
    - cron: '0 3 * * *'    # JST 12:00 (UTC 03:00)
    - cron: '0 9 * * *'    # JST 18:00 (UTC 09:00)
    - cron: '0 1 1 * *'    # 月初 JST 10:00 (UTC 01:00) — 月次pruneバッチ
  workflow_dispatch:
    inputs:
      skip_collect:
        description: 'collect.py をスキップ（既存 collected_articles.jsonl を使用）'
        type: boolean
        default: false
      dry_run:
        description: 'publish.py をスキップ（生成・監査のみ）'
        type: boolean
        default: false

jobs:
  pipeline:
    name: コンテンツ生成・公開
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: 依存パッケージをインストール
        run: pip install -r pipeline/requirements.txt

      - name: Playwright（Chromium）をインストール
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: パイプラインキャッシュを復元
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            pipeline/processed_urls_cache.json
            pipeline/progressive_slugs_cache.json
          key: tgg-pipeline-cache-${{ github.run_id }}
          restore-keys: |
            tgg-pipeline-cache-

      - name: '📡 collect.py — ニュース収集'
        if: ${{ github.event.inputs.skip_collect != 'true' }}
        working-directory: pipeline
        run: python collect.py
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: 収集件数を確認
        working-directory: pipeline
        run: |
          if [ -f collected_articles.jsonl ]; then
            COUNT=$(wc -l < collected_articles.jsonl)
            echo "収集記事数: $COUNT 件"
            echo "COLLECTED_COUNT=$COUNT" >> $GITHUB_ENV
            if [ "$COUNT" -eq 0 ]; then
              echo "新規記事なし（キャッシュ済みURL）。このバッチはスキップします。"
              echo "SKIP_PIPELINE=true" >> $GITHUB_ENV
            fi
          else
            echo "COLLECTED_COUNT=0" >> $GITHUB_ENV
            echo "SKIP_PIPELINE=true" >> $GITHUB_ENV
          fi

      - name: 曜日別パラメータを設定（JST土日は半分）
        run: |
          JST_DOW=$(TZ=Asia/Tokyo date +%u)   # 1=月 … 6=土 7=日
          if [ "$JST_DOW" -ge 6 ]; then
            echo "DAILY_MAX=5"    >> $GITHUB_ENV
            echo "DAILY_TARGET=5" >> $GITHUB_ENV
            echo "今日はJST週末 → 1回あたり5件（15件/日）"
          else
            echo "DAILY_MAX=10"    >> $GITHUB_ENV
            echo "DAILY_TARGET=10" >> $GITHUB_ENV
            echo "今日はJST平日 → 1回あたり10件（30件/日）"
          fi

      - name: '✍️  generate.py — 記事生成'
        if: ${{ env.SKIP_PIPELINE != 'true' }}
        working-directory: pipeline
        run: python generate.py --max $DAILY_MAX
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 生成件数を確認
        if: ${{ env.SKIP_PIPELINE != 'true' }}
        working-directory: pipeline
        run: |
          if [ -f generated_articles.jsonl ]; then
            COUNT=$(wc -l < generated_articles.jsonl)
            echo "生成記事数: $COUNT 件"
            echo "GENERATED_COUNT=$COUNT" >> $GITHUB_ENV
          fi

      - name: '🔍🔧🚀 audit_loop.py — 品質監査・自動修正・公開'
        if: ${{ env.SKIP_PIPELINE != 'true' }}
        working-directory: pipeline
        run: |
          ARGS="--target $DAILY_TARGET"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --no-publish"
          fi
          python audit_loop.py $ARGS
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:     ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEXTJS_REVALIDATE_URL:    ${{ secrets.NEXTJS_REVALIDATE_URL }}
          NEXTJS_REVALIDATE_SECRET: ${{ secrets.NEXTJS_REVALIDATE_SECRET }}
          SITE_SITEMAP_URL:         ${{ secrets.SITE_SITEMAP_URL }}
          UNSPLASH_ACCESS_KEY:      ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEXT_PUBLIC_SITE_URL:     ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          INDEXNOW_KEY:             967d6d6637f240f62434afecf3470a31

      - name: 実行結果サマリー
        if: always()
        working-directory: pipeline
        run: |
          echo "## Tech Gear Guide パイプライン実行結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| ステップ | 件数 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 収集 | ${COLLECTED_COUNT:-N/A} |" >> $GITHUB_STEP_SUMMARY
          echo "| 生成 | ${GENERATED_COUNT:-N/A} |" >> $GITHUB_STEP_SUMMARY
          if [ -f audit_report.jsonl ]; then
            APASS=$(grep -c '"status":"PASS"' audit_report.jsonl || true)
            AWARN=$(grep -c '"status":"WARN"' audit_report.jsonl || true)
            AFAIL=$(grep -c '"status":"FAIL"' audit_report.jsonl || true)
            echo "| 監査PASS | $APASS |" >> $GITHUB_STEP_SUMMARY
            echo "| 監査WARN（修正対象） | $AWARN |" >> $GITHUB_STEP_SUMMARY
            echo "| 監査FAIL（修正対象） | $AFAIL |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f published_log.jsonl ]; then
            PUB=$(grep -c '"action":"inserted"' published_log.jsonl || true)
            UPD=$(grep -c '"action":"updated"'  published_log.jsonl || true)
            SKP=$(grep -c '"action":"skipped"'  published_log.jsonl || true)
            FAIL=$(grep -c '"status":"failed"'  published_log.jsonl || true)
            echo "| 新規公開 | $PUB |" >> $GITHUB_STEP_SUMMARY
            echo "| Progressive更新 | $UPD |" >> $GITHUB_STEP_SUMMARY
            echo "| スキップ | $SKP |" >> $GITHUB_STEP_SUMMARY
            echo "| 失敗 | $FAIL |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: パイプラインキャッシュを保存
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            pipeline/processed_urls_cache.json
            pipeline/progressive_slugs_cache.json
          key: tgg-pipeline-cache-${{ github.run_id }}

      - name: ログをアーティファクトに保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: |
            pipeline/published_log.jsonl
            pipeline/audit_report.jsonl
          retention-days: 30
          if-no-files-found: ignore

      - name: 失敗通知
        if: failure()
        run: |
          echo "パイプライン失敗: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  monthly-prune:
    name: 月次pruneバッチ
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' && github.event.schedule == '0 1 1 * *'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: '🗑️  prune.py — 低PV記事のnoindex・論理削除'
        working-directory: pipeline
        run: python prune.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: pruneログをアーティファクトに保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prune-log-${{ github.run_number }}
          path: pipeline/prune_log.jsonl
          retention-days: 90
          if-no-files-found: ignore

  weekly-refresh:
    name: 週次リフレッシュバッチ
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' && github.event.schedule == '0 22 * * 0'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: '♻️  refresh.py — 流入減衰記事のリフレッシュ'
        working-directory: pipeline
        run: python refresh.py
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:     ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEXTJS_REVALIDATE_URL:    ${{ secrets.NEXTJS_REVALIDATE_URL }}
          NEXTJS_REVALIDATE_SECRET: ${{ secrets.NEXTJS_REVALIDATE_SECRET }}
          SITE_SITEMAP_URL:         ${{ secrets.SITE_SITEMAP_URL }}
